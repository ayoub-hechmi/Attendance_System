services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d attendance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-worker:
    build: ./ai-worker
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    volumes:
      - ./ai-worker:/app
      - deepface_weights:/root/.deepface
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/attendance_db
      REDIS_URL: redis://redis:6379/0
      AI_WORKER_URL: http://ai-worker:8001
      SECRET_KEY: ${SECRET_KEY}
      FACE_SIMILARITY_THRESHOLD: "0.40"
      ATTENDANCE_WINDOW_MINUTES: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-worker:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/attendance_db
      REDIS_URL: redis://redis:6379/0
      AI_WORKER_URL: http://ai-worker:8001
      SECRET_KEY: ${SECRET_KEY}
      FACE_SIMILARITY_THRESHOLD: "0.40"
      ATTENDANCE_WINDOW_MINUTES: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data:
  deepface_weights:
